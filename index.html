<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hisaab — Simple Ledger &amp; Expense Tracker</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#4F63D2">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Hisaab">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<style>
  :root{
    --paper: #F6F8FC;
    --paper-card: #FFFFFF;
    --paper-shadow: #E4E9F2;
    --rule: #E7EBF3;
    --rule-strong: #D2D9E6;
    --ink: #222836;
    --ink-soft: #7A8299;
    --brass: #4F63D2;
    --brass-dark: #3B4FBF;
    --credit: #16A34A;
    --credit-bg: #E3F9EA;
    --debit: #E11D48;
    --debit-bg: #FDE6EC;
  }
  body.dark{
    --paper: #14161F;
    --paper-card: #1E212C;
    --paper-shadow: #0B0C11;
    --rule: #2C3040;
    --rule-strong: #3A3F52;
    --ink: #EDEFF5;
    --ink-soft: #9AA1B5;
    --brass: #7C8CF0;
    --brass-dark: #6273E8;
    --credit: #4ADE80;
    --credit-bg: #113322;
    --debit: #FB7185;
    --debit-bg: #3A1420;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color: transparent;}
  html,body{margin:0;padding:0;}
  body{
    background: var(--paper);
    font-family: 'Nunito', sans-serif;
    color: var(--ink);
    min-height: 100vh;
    padding-bottom: 88px;
    transition: background-color 0.2s ease, color 0.2s ease;
  }
  svg.icon{ display:block; }
  svg.icon.flip{ transform: rotate(180deg); }
  .wrap{ padding-left: 16px; padding-right: 16px; max-width: 560px; margin: 0 auto; }
  header{ padding: 20px 2px 14px 2px; }
  header h1{ font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 26px; margin: 0; letter-spacing: -0.2px; }
  header .sub{ font-size: 13px; color: var(--ink-soft); margin-top: 4px; font-weight: 600; }
  .stat-row{ display: flex; gap: 12px; margin-top: 18px; }
  .stat{ flex: 1; background: var(--paper-card); border: 1px solid var(--rule); border-radius: 16px; padding: 14px 16px; box-shadow: 0 2px 8px rgba(31,41,55,0.05); }
  .stat .label{ font-size: 11.5px; letter-spacing: 0.02em; color: var(--ink-soft); font-weight: 700;}
  .stat .value{ font-family: 'Nunito', sans-serif; font-size: 21px; font-weight: 800; margin-top: 4px;}
  .stat.get .value{ color: var(--credit); }
  .stat.pay .value{ color: var(--debit); }

  .tabbar{ position: fixed; bottom: 0; left: 0; right: 0; background: var(--paper-card); border-top: 1px solid var(--rule); display: flex; z-index: 10; padding-bottom: env(safe-area-inset-bottom, 0); box-shadow: 0 -2px 10px rgba(31,41,55,0.04); }
  .tabbar button{ flex: 1; background: none; border: none; padding: 11px 4px 10px 4px; font-family: 'Nunito', sans-serif; font-size: 12px; font-weight: 800; color: var(--ink-soft); display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .tabbar button.active{ color: var(--brass); }
  .tabbar button:after{ content:''; display:block; width: 28px; height: 3px; margin-top:2px; border-radius: 3px; background: transparent; }
  .tabbar button.active:after{ background: var(--brass); }

  .section-title{ font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 16px; margin: 24px 0 12px 0; display:flex; align-items:center; justify-content:space-between; gap:8px; }
  .section-title .add-btn{ font-family:'Nunito',sans-serif; font-size: 13px; font-weight: 800; color: #fff; background: var(--brass); border: none; border-radius: 24px; padding: 8px 14px; display:flex; align-items:center; gap:5px; white-space:nowrap; box-shadow: 0 3px 8px rgba(79,99,210,0.3); }

  .search-box{ display:flex; align-items:center; gap:8px; background: var(--paper-card); border:1px solid var(--rule); border-radius: 14px; padding: 12px 14px; margin-bottom: 14px; color: var(--ink-soft); }
  .search-box input{ border:none; background:none; outline:none; flex:1; font-family:'Nunito',sans-serif; font-size:15px; font-weight:600; color: var(--ink); }

  .filter-row{ display:flex; gap:8px; margin-bottom: 8px; }
  .filter-row select{ flex:1; padding: 10px 12px; border-radius:12px; border:1px solid var(--rule-strong); background: var(--paper-card); color: var(--ink); font-family:'Nunito',sans-serif; font-weight:700; font-size:14px; }

  .party-row{ background: var(--paper-card); border: 1px solid var(--rule); border-radius: 16px; padding: 14px 16px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 6px rgba(31,41,55,0.04); }
  .party-row .name{ font-weight: 800; font-size: 15.5px; display:flex; align-items:center; gap:6px; }
  .party-row .meta{ font-size: 12px; color: var(--ink-soft); margin-top: 3px; font-weight:600;}
  .party-row .amt{ font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 16px; text-align:right; }
  .party-row .amt.get{ color: var(--credit); }
  .party-row .amt.pay{ color: var(--debit); }
  .party-row .amt .tag{ display:block; font-size: 10px; font-family:'Nunito',sans-serif; font-weight:800; letter-spacing:0.02em; opacity:0.8;}
  .overdue-badge{ font-size:10px; font-weight:800; background: var(--debit-bg); color: var(--debit); padding:3px 8px; border-radius:10px; }

  .empty{ text-align:center; padding: 40px 16px; color: var(--ink-soft); font-family:'Nunito',sans-serif; font-weight:700; font-size: 15px; border: 2px dashed var(--rule-strong); border-radius: 16px; }

  .entry-row{ display:flex; justify-content: space-between; align-items:flex-start; padding: 12px 0; border-bottom: 1px solid var(--rule); gap: 10px; }
  .entry-row:last-child{ border-bottom: none; }
  .entry-row .note{ font-size: 14.5px; font-weight: 700; }
  .entry-row .date{ font-size: 12px; color: var(--ink-soft); margin-top: 2px; font-weight:600; }
  .entry-row .right{ text-align: right; flex-shrink:0; }
  .entry-row .amt{ font-family:'Nunito',sans-serif; font-weight:800; font-size:15.5px; }
  .entry-row .amt.gave{ color: var(--debit); }
  .entry-row .amt.got{ color: var(--credit); }
  .entry-row .bal{ font-family:'Nunito',sans-serif; font-size: 11px; color: var(--ink-soft); margin-top:2px; font-weight:600;}

  .detail-header{ display:flex; align-items:center; gap: 10px; padding: 18px 0 8px 0; }
  .icon-btn{ background: var(--paper-card); border: 1px solid var(--rule-strong); border-radius: 50%; width: 38px; height:38px; display:flex; align-items:center; justify-content:center; color: var(--brass); flex-shrink:0; }
  .detail-header h2{ font-family:'Nunito',sans-serif; font-weight:800; font-size: 20px; margin:0; flex:1; }
  .detail-header .spacer{ flex:1; }
  .detail-balance{ background: var(--paper-card); border:1px solid var(--rule); border-radius: 18px; padding: 18px; margin: 12px 0 20px 0; text-align:center; box-shadow: 0 3px 10px rgba(31,41,55,0.06); }
  .detail-balance .label{ font-size: 12px; letter-spacing:0.02em; color: var(--ink-soft); font-weight:800;}
  .detail-balance .value{ font-family:'Nunito',sans-serif; font-size: 28px; font-weight:800; margin-top:5px;}
  .detail-balance .value.get{ color: var(--credit);}
  .detail-balance .value.pay{ color: var(--debit);}

  .quick-actions{ display:flex; gap:12px; margin-bottom: 20px;}
  .quick-actions button{ flex:1; padding: 16px; border-radius: 16px; font-weight: 800; font-size: 15px; border: none; font-family:'Nunito',sans-serif; box-shadow: 0 3px 8px rgba(31,41,55,0.08); }
  .quick-actions .gave-btn{ background: var(--debit-bg); color: var(--debit); }
  .quick-actions .got-btn{ background: var(--credit-bg); color: var(--credit); }
  .icon-action-btn{ flex:1; padding:12px 8px; border-radius:16px; font-weight:800; font-size:12.5px; border:1px solid var(--rule-strong); background:var(--paper-card); color:var(--brass); display:flex; flex-direction:column; align-items:center; gap:5px; font-family:'Nunito',sans-serif; }

  .modal-overlay{ position: fixed; inset:0; background: rgba(20,24,35,0.55); z-index: 50; display:flex; align-items:flex-end; justify-content:center; }
  .modal{ background: var(--paper-card); width:100%; max-width: 560px; max-height: 88vh; overflow-y:auto; border-radius: 22px 22px 0 0; padding: 22px 20px calc(22px + env(safe-area-inset-bottom,0)) 20px; }
  .modal h3{ font-family:'Nunito',sans-serif; font-weight:800; margin: 0 0 16px 0; font-size: 19px; display:flex; align-items:center; gap:8px;}
  .field{ margin-bottom: 14px; }
  .field label{ display:block; font-size: 12px; font-weight:800; color: var(--ink-soft); margin-bottom: 6px;}
  .field input, .field select, .field textarea{ width: 100%; padding: 13px 14px; border-radius: 12px; border: 2px solid var(--rule-strong); background: var(--paper); font-family:'Nunito',sans-serif; font-weight:700; font-size: 16px; color: var(--ink); }
  .field input:focus, .field select:focus, .field textarea:focus{ outline: none; border-color: var(--brass); }
  .modal-btns{ display:flex; gap:10px; margin-top: 18px;}
  .modal-btns button{ flex:1; padding: 14px; border-radius:14px; font-weight:800; font-size:15px; font-family:'Nunito',sans-serif; border:2px solid var(--rule-strong);}
  .btn-primary{ background: var(--brass); color: #fff; border-color: var(--brass) !important; }
  .btn-secondary{ background: transparent; color: var(--ink-soft); }
  .btn-danger{ background: var(--debit-bg); color: var(--debit); border-color: var(--debit-bg) !important; }

  .action-sheet-item{ display:flex; align-items:center; gap:12px; padding: 15px 4px; font-size:15.5px; font-weight:700; border-bottom:1px solid var(--rule); }
  .action-sheet-item:last-child{ border-bottom:none; }
  .action-sheet-item.danger{ color: var(--debit); }

  .cat-bar-row{ margin-bottom: 14px; }
  .cat-bar-row .top{ display:flex; justify-content:space-between; font-size:13.5px; margin-bottom:5px;}
  .cat-bar-row .top .catname{ font-weight:700; }
  .cat-bar-row .top .catamt{ font-family:'Nunito',sans-serif; color: var(--ink-soft); font-weight:700; }
  .cat-bar-track{ height:9px; background: var(--rule); border-radius: 6px; overflow:hidden; }
  .cat-bar-fill{ height:100%; background: var(--brass); border-radius:6px; }
  .cat-bar-fill.over{ background: var(--debit); }

  .month-nav{ display:flex; align-items:center; justify-content:space-between; margin: 20px 0 8px 0;}
  .month-nav .mlabel{ font-family:'Nunito',sans-serif; font-weight:800; font-size:16px;}

  .expense-row{ background: var(--paper-card); border:1px solid var(--rule); border-radius:16px; padding: 13px 15px; margin-bottom:9px; display:flex; justify-content:space-between; align-items:center; box-shadow: 0 2px 6px rgba(31,41,55,0.04); }
  .expense-row .cat{ font-weight:800; font-size:15px; }
  .expense-row .note{ font-size:12.5px; color: var(--ink-soft); margin-top:1px; font-weight:600;}
  .expense-row .amt{ font-family:'Nunito',sans-serif; font-weight:800; font-size:15.5px; color: var(--debit);}
  .expense-row .date{ font-size:11px; color: var(--ink-soft); text-align:right; margin-top:2px; font-weight:600;}

  .toast{ position:fixed; bottom: 96px; left:50%; transform: translateX(-50%); background: var(--ink); color: var(--paper-card); padding: 11px 18px; border-radius: 24px; font-size: 14px; font-weight:700; z-index: 100; box-shadow: 0 6px 16px rgba(0,0,0,0.25); opacity:0; pointer-events:none; transition: opacity 0.25s ease; text-align:center; max-width:85%; }
  .toast.show{ opacity: 1; }

  .settings-fab{ position: fixed; top: 18px; right: 16px; z-index: 20; width: 40px; height: 40px; border-radius: 50%; background: var(--paper-card); border: 1px solid var(--rule-strong); color: var(--brass); display:flex; align-items:center; justify-content:center; box-shadow: 0 3px 8px rgba(31,41,55,0.1); }
  .fab{ position: fixed; bottom: 92px; right: 18px; z-index: 15; width: 58px; height: 58px; border-radius: 50%; background: var(--brass); color: #fff; border: none; display:flex; align-items:center; justify-content:center; box-shadow: 0 6px 18px rgba(79,99,210,0.45); }
  .fab:active{ transform: scale(0.94); }

  .currency-option{ display:flex; align-items:center; justify-content:space-between; padding: 13px 4px; border-bottom: 1px solid var(--rule); cursor: pointer; }
  .currency-option:last-child{ border-bottom: none; }
  .currency-option .sym{ font-family:'Nunito',sans-serif; font-weight:800; width: 48px; color: var(--brass); }
  .currency-option .cname{ flex:1; font-size: 14.5px; font-weight:600; }
  .currency-option .check{ color: var(--credit); font-weight:800; visibility:hidden; }
  .currency-option.selected .check{ visibility: visible; }

  .settings-section{ margin-bottom: 20px; }
  .settings-section .stitle{ font-size:12px; letter-spacing:0.02em; color: var(--ink-soft); font-weight:800; margin-bottom:10px; }
  .settings-row{ display:flex; align-items:center; justify-content:space-between; padding: 13px 2px; border-bottom:1px solid var(--rule); }
  .settings-row:last-child{ border-bottom:none; }
  .settings-row .stext{ font-size:15px; font-weight:700; }
  .settings-row .shint{ font-size:12px; color: var(--ink-soft); margin-top:2px; font-weight:600; }
  .toggle{ position:relative; width:46px; height:26px; border-radius:16px; background: var(--rule-strong); flex-shrink:0; }
  .toggle.on{ background: var(--brass); }
  .toggle .knob{ position:absolute; top:2px; left:2px; width:22px; height:22px; border-radius:50%; background:#fff; transition: left 0.15s ease; }
  .toggle.on .knob{ left:22px; }
  .settings-btn{ width:100%; text-align:left; padding:13px 2px; border-bottom:1px solid var(--rule); background:none; border-left:none; border-right:none; border-top:none; font-size:15px; font-weight:700; color: var(--ink); display:flex; align-items:center; gap:11px; }
  .settings-btn:last-child{ border-bottom:none; }
  .settings-btn.danger{ color: var(--debit); }

  #splash{ position:fixed; inset:0; z-index:200; background: var(--brass); color:#fff; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:10px; transition: opacity 0.4s ease; }
  #splash h1{ font-family:'Nunito',sans-serif; font-weight:800; font-size:28px; margin:0; }
  #splash .tagline{ font-size:13px; opacity:0.9; font-family:'Nunito',sans-serif; font-weight:600; }
  #splash.hide{ opacity:0; pointer-events:none; }

  #lockScreen{ position:fixed; inset:0; z-index:150; background: var(--paper); display:flex; flex-direction:column; align-items:center; justify-content:center; gap:18px; padding:20px; }
  #lockScreen h2{ font-family:'Nunito',sans-serif; font-weight:800; margin:0; font-size:20px; }
  #lockScreen input{ width:170px; text-align:center; letter-spacing:8px; font-size:24px; padding:12px; border-radius:12px; border:2px solid var(--rule-strong); background: var(--paper-card); color: var(--ink); font-family:'Nunito',sans-serif; font-weight:800; }
  #lockScreen button.unlock{ background: var(--brass); color:#fff; border:none; padding:13px 30px; border-radius:14px; font-weight:800; font-size:15px; }
  #lockScreen .forgot{ font-size:13px; color: var(--ink-soft); text-decoration:underline; background:none; border:none; font-weight:600; }
  .shake{ animation: shakeAnim 0.35s; }
  @keyframes shakeAnim{ 0%,100%{transform:translateX(0);} 25%{transform:translateX(-8px);} 75%{transform:translateX(8px);} }

  @media print{
    .tabbar, .settings-fab, .quick-actions, .icon-btn, .section-title .add-btn, #splash, #lockScreen{ display:none !important; }
    body{ background:#fff; padding-bottom:0; }
    .wrap{ padding-left:8px; }
  }
  .thumb{ width:38px; height:38px; object-fit:cover; border-radius:10px; border:1px solid var(--rule-strong); flex-shrink:0; }
  .photo-preview{ width:68px; height:68px; object-fit:cover; border-radius:12px; border:1px solid var(--rule-strong); margin-top:8px; display:block; }
  .seg-control{ display:flex; background: var(--paper-card); border:1px solid var(--rule-strong); border-radius:14px; overflow:hidden; margin-bottom:14px; }
  .seg-control button{ flex:1; padding:10px; font-size:13.5px; font-weight:800; border:none; background:none; color: var(--ink-soft); font-family:'Nunito',sans-serif; }
  .seg-control button.active{ background: var(--brass); color:#fff; }
  .year-chart{ display:flex; align-items:flex-end; gap:5px; height:140px; margin: 18px 0 8px 0; padding: 0 2px; }
  .year-bar-col{ flex:1; display:flex; flex-direction:column; align-items:center; height:100%; justify-content:flex-end; gap:5px; }
  .year-bar-track{ width:100%; max-width:22px; height:110px; background: var(--rule); border-radius:6px; display:flex; align-items:flex-end; overflow:hidden; }
  .year-bar-fill{ width:100%; background: var(--brass); border-radius:6px 6px 0 0; min-height:2px; }
  .year-bar-label{ font-size:10px; color: var(--ink-soft); font-weight:700; }
  .profile-pill{ display:inline-flex; align-items:center; gap:5px; font-size:12px; font-weight:800; color: var(--brass); background: var(--paper-card); border:1px solid var(--rule-strong); padding:6px 12px; border-radius:20px; margin-top:10px; }
</style>
</head>
<body>
<div id="splash"><h1>Hisaab</h1><div class="tagline">Getting things ready…</div></div>
<div id="lockScreen" style="display:none;">
  <h2>Enter PIN</h2>
  <input type="password" id="pinInput" inputmode="numeric" maxlength="6" autofocus>
  <button class="unlock" id="unlockBtn">Unlock</button>
  <button class="forgot" id="forgotPinBtn">Forgot PIN?</button>
</div>
<button class="settings-fab" id="settingsFab" title="Settings"></button>
<button class="fab" id="mainFab" style="display:none;"></button>
<div class="wrap" id="app"></div>
<div class="tabbar" id="tabbar">
  <button data-tab="home" class="active"></button>
  <button data-tab="khata"></button>
  <button data-tab="kharch"></button>
</div>
<div class="toast" id="toast"></div>
<input type="file" id="importFileInput" accept="application/json" style="display:none;">

const storage = {
  async get(key){
    try{ const raw = localStorage.getItem(key); return raw===null? null : {key, value: raw}; }
    catch(e){ return null; }
  },
  async set(key, value){
    try{ localStorage.setItem(key, value); return {key, value}; }
    catch(e){ return null; }
  },
  async delete(key){
    try{ localStorage.removeItem(key); return {key, deleted:true}; }
    catch(e){ return null; }
  }
};

function showToast(msg){
  toastEl.innerHTML = '';
  toastEl.textContent = msg;
  toastEl.classList.add('show');
  clearTimeout(showToast._t);
  showToast._t = setTimeout(()=> toastEl.classList.remove('show'), 2000);
}

function showUndoToast(msg, onUndo){
  toastEl.innerHTML = `<span>${escapeHtml(msg)}</span> <button id="undoBtn" style="margin-left:10px;background:none;border:none;color:#8FD9C4;font-weight:700;text-decoration:underline;">Undo</button>`;
  toastEl.classList.add('show');
  clearTimeout(showToast._t);
  document.getElementById('undoBtn').onclick = ()=>{ onUndo(); toastEl.classList.remove('show'); };
  showToast._t = setTimeout(()=> toastEl.classList.remove('show'), 4000);
}

function triggerUndo(kind, label, restoreFn){
  if(pendingDelete){ clearTimeout(pendingDelete.timer); finalizePendingDelete(); }
  pendingDelete = { kind, restoreFn };
  pendingDelete.timer = setTimeout(finalizePendingDelete, 4000);
  showUndoToast(label, ()=>{
    clearTimeout(pendingDelete.timer);
    restoreFn();
    pendingDelete = null;
    render();
  });
}

async function finalizePendingDelete(){
  if(!pendingDelete) return;
  const kind = pendingDelete.kind;
  pendingDelete = null;
  if(kind==='party' || kind==='entry') await saveKhata();
  else if(kind==='expense') await saveExpenses();
}

function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }

function curSymbol(){
  const c = CURRENCIES.find(c=>c.code===state.currency);
  return c ? c.symbol : '₹';
}
function fmt(n){
  const num = Number(n)||0;
  const locale = (state.currency === 'INR' || state.currency === 'NPR') ? 'en-IN' : 'en-US';
  const sep = /[A-Za-z]$/.test(curSymbol()) ? ' ' : '';
  return curSymbol() + sep + num.toLocaleString(locale, {maximumFractionDigits:0});
}
function fmtDate(d){
  const dt = new Date(d);
  return dt.toLocaleDateString('en-IN', {day:'numeric', month:'short', year:'numeric'});
}
function daysAgo(d){
  return Math.floor((Date.now() - new Date(d).getTime()) / 86400000);
}
function escapeHtml(str){
  const d = document.createElement('div');
  d.textContent = str==null? '' : str;
  return d.innerHTML;
}

async function loadData(){
  try{
    const profilesRaw = await storage.get('profiles-store');
    if(profilesRaw && profilesRaw.value){
      const parsed = JSON.parse(profilesRaw.value);
      state.profiles = parsed.profiles || [];
      state.activeProfileId = parsed.activeProfileId || (state.profiles[0] && state.profiles[0].id) || null;
    }
  }catch(e){}

  if(!state.profiles || state.profiles.length===0){
    const defaultId = 'default';
    state.profiles = [{id: defaultId, name: 'My Ledger'}];
    state.activeProfileId = defaultId;
    try{
      const legacyKhata = await storage.get('khata-store');
      if(legacyKhata && legacyKhata.value) await storage.set(`khata-store:${defaultId}`, legacyKhata.value);
    }catch(e){}
    try{
      const legacyExp = await storage.get('expenses-store');
      if(legacyExp && legacyExp.value) await storage.set(`expenses-store:${defaultId}`, legacyExp.value);
    }catch(e){}
    await saveProfiles();
  }

  try{
    const khata = await storage.get(khataKey());
    if(khata && khata.value){
      const parsed = JSON.parse(khata.value);
      state.parties = parsed.parties || [];
      state.entries = parsed.entries || {};
    }
  }catch(e){}
  try{
    const exp = await storage.get(expensesKey());
    if(exp && exp.value){
      state.expenses = JSON.parse(exp.value).expenses || [];
    }
  }catch(e){}
  try{
    const cash = await storage.get(cashKey());
    if(cash && cash.value){
      state.cashTransactions = JSON.parse(cash.value).cashTransactions || [];
    }
  }catch(e){}
  try{
    const settings = await storage.get('settings-store');
    if(settings && settings.value){
      const parsed = JSON.parse(settings.value);
      if(parsed.currency) state.currency = parsed.currency;
      if(parsed.theme) state.theme = parsed.theme;
      if(parsed.pin) state.pin = parsed.pin;
      if(parsed.budgets) state.budgets = parsed.budgets;
      if(parsed.categories && parsed.categories.length) state.categories = parsed.categories;
      if(parsed.lang) state.lang = parsed.lang;
      if(parsed.upiId) state.upiId = parsed.upiId;
    }
  }catch(e){}
  applyTheme();
  state.loading = false;
  hideSplash();
  if(state.pin){
    showLockScreen();
  }
  render();
  maybeShowOnboarding();
}

async function maybeShowOnboarding(){
  try{
    const seen = await storage.get('onboarding-seen');
    if(seen && seen.value === 'true') return;
    if(state.parties.length>0 || state.expenses.length>0){
      await storage.set('onboarding-seen','true');
      return;
    }
    showOnboarding();
  }catch(e){}
}

function showOnboarding(){
  const steps = [
    { icon:'', emoji:'👋', title:'Welcome to Hisaab', body:'Track money people owe you, and your home expenses — all in one simple app.' },
    { icon:'book', title:'Keep a Khata', body:'Add anyone you lend to or borrow from. Log what you gave or got, and Hisaab keeps the running balance for you.' },
    { icon:'cash', title:'Track Home Expenses', body:'Log your daily spending by category, and see monthly and yearly totals at a glance.' }
  ];
  let idx = 0;
  const overlay = document.createElement('div');
  overlay.id = 'onboardingOverlay';
  overlay.style.cssText = 'position:fixed;inset:0;z-index:190;background:var(--paper);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px;text-align:center;';
  function renderStep(){
    const s = steps[idx];
    overlay.innerHTML = `
      <div style="margin-bottom:18px;color:var(--brass);">${s.emoji ? `<div style="font-size:52px;">${s.emoji}</div>` : icon(s.icon,56)}</div>
      <h2 style="font-family:'Nunito',sans-serif;font-weight:800;font-size:22px;margin:0 0 10px 0;color:var(--ink);">${s.title}</h2>
      <p style="font-size:15px;color:var(--ink-soft);font-weight:600;max-width:320px;line-height:1.5;margin:0 0 28px 0;">${s.body}</p>
      <div style="display:flex;gap:6px;margin-bottom:24px;">
        ${steps.map((_,i)=>`<div style="width:${i===idx?20:7}px;height:7px;border-radius:4px;background:${i===idx?'var(--brass)':'var(--rule-strong)'};"></div>`).join('')}
      </div>
      <button id="obNextBtn" style="background:var(--brass);color:#fff;border:none;padding:14px 36px;border-radius:14px;font-weight:800;font-size:15px;font-family:'Nunito',sans-serif;">${idx===steps.length-1?'Get Started':'Next'}</button>
      ${idx<steps.length-1?`<button id="obSkipBtn" style="background:none;border:none;color:var(--ink-soft);font-weight:700;font-size:13px;margin-top:14px;">Skip</button>`:''}
    `;
    document.getElementById('obNextBtn').onclick = ()=>{
      if(idx===steps.length-1){ finishOnboarding(); }
      else { idx++; renderStep(); }
    };
    if(document.getElementById('obSkipBtn')) document.getElementById('obSkipBtn').onclick = finishOnboarding;
  }
  function finishOnboarding(){
    overlay.remove();
    storage.set('onboarding-seen','true');
  }
  document.body.appendChild(overlay);
  renderStep();
}

function stripPhotosFromEntries(entriesObj){
  const clean = {};
  for(const pid in entriesObj){
    clean[pid] = (entriesObj[pid]||[]).map(e=>{ const copy = Object.assign({}, e); delete copy.photo; return copy; });
  }
  return clean;
}
function stripPhotosFromExpenses(list){
  return (list||[]).map(e=>{ const copy = Object.assign({}, e); delete copy.photo; return copy; });
}

async function loadFromCloud(){
  if(!fbReady || !state.user) return;
  showCloudLoadingOverlay(true);
  setSyncStatus('syncing');
  try{
    const userDoc = await db.collection('users').doc(state.user.uid).get();
    if(userDoc.exists && userDoc.data().profiles && userDoc.data().profiles.length){
      const data = userDoc.data();
      state.profiles = data.profiles;
      state.activeProfileId = data.activeProfileId || data.profiles[0].id;
      state.isPremium = !!data.isPremium;
    } else {
      await cloudSaveProfiles();
    }
    const settingsDoc = await db.collection('users').doc(state.user.uid).collection('meta').doc('settings').get();
    if(settingsDoc.exists){
      const s = settingsDoc.data();
      if(s.currency) state.currency = s.currency;
      if(s.theme) state.theme = s.theme;
      if(s.budgets) state.budgets = s.budgets;
      if(s.categories && s.categories.length) state.categories = s.categories;
      if(s.lang) state.lang = s.lang;
      if(s.upiId) state.upiId = s.upiId;
      applyTheme();
    } else {
      await cloudSaveSettings();
    }
    const ledgerDoc = await db.collection('users').doc(state.user.uid).collection('ledgers').doc(state.activeProfileId).get();
    if(ledgerDoc.exists){
      const l = ledgerDoc.data();
      state.parties = l.parties||[];
      state.entries = l.entries||{};
      state.expenses = l.expenses||[];
      state.cashTransactions = l.cashTransactions||[];
      await saveKhata(); await saveExpenses(); await saveCash();
    } else {
      await cloudSaveLedger();
    }
    setSyncStatus('synced');
    showCloudLoadingOverlay(false);
    render();
    showToast('Synced with your account');
  }catch(e){
    setSyncStatus('offline');
    showCloudLoadingOverlay(false);
    render();
    showToast('Could not reach the cloud — using data on this device');
  }
}

function showCloudLoadingOverlay(show){
  let el = document.getElementById('cloudLoadingOverlay');
  if(show){
    if(!el){
      el = document.createElement('div');
      el.id = 'cloudLoadingOverlay';
      el.style.cssText = 'position:fixed;inset:0;z-index:180;background:rgba(20,24,35,0.35);display:flex;align-items:center;justify-content:center;';
      el.innerHTML = `<div style="background:var(--paper-card);padding:18px 26px;border-radius:16px;font-weight:800;color:var(--ink);box-shadow:0 6px 20px rgba(0,0,0,0.2);">Loading your data…</div>`;
      document.body.appendChild(el);
    }
  } else if(el){
    el.remove();
  }
}

function partyBalance(partyId){
  const list = state.entries[partyId] || [];
  return list.reduce((sum,e)=> sum + (e.type==='gave' ? e.amount : -e.amount), 0);
}
function partyLastDate(partyId){
  const list = state.entries[partyId] || [];
  if(list.length===0) return null;
  return list.reduce((latest,e)=> new Date(e.date) > new Date(latest) ? e.date : latest, list[0].date);
}
function totalReceivable(){
  return state.parties.reduce((s,p)=>{ const b = partyBalance(p.id); return s + (b>0? b:0); },0);
}
function totalPayable(){
  return state.parties.reduce((s,p)=>{ const b = partyBalance(p.id); return s + (b<0? -b:0); },0);
}
function totalCashAdded(){
  return state.cashTransactions.reduce((s,c)=>s+c.amount,0);
}
function totalSpentFromCash(){
  return state.expenses.reduce((s,e)=> s + (e.paidFromCash ? e.amount : 0), 0);
}
function cashBalance(){
  return totalCashAdded() - totalSpentFromCash();
}
function currentMonthExpenses(){
  const now = new Date();
  now.setMonth(now.getMonth() + state.monthOffset);
  const y = now.getFullYear(), m = now.getMonth();
  let list = state.expenses.filter(e=>{
    const d = new Date(e.date);
    return d.getFullYear()===y && d.getMonth()===m;
  });
  if(state.expenseCategoryFilter !== 'All'){
    list = list.filter(e=> e.category === state.expenseCategoryFilter);
  }
  return list.sort((a,b)=> new Date(b.date)-new Date(a.date));
}
function monthLabel(){
  const now = new Date();
  now.setMonth(now.getMonth() + state.monthOffset);
  return now.toLocaleDateString('en-IN', {month:'long', year:'numeric'});
}

function renderPartyList(list){

    const cls = bal>=0 ? 'get':'pay';
    const tag = bal>=0 ? t('youllGetTag') : t('youllPayTag');
    const lastDate = partyLastDate(p.id);
    const overdue = bal>0 && lastDate && daysAgo(lastDate) > 30;
    const entryCount = (state.entries[p.id]||[]).length;
    return `<div class="party-row" data-id="${p.id}">
      <div>
        <div class="name">${escapeHtml(p.name)} ${overdue?'<span class="overdue-badge">Pending 30+ days</span>':''}</div>

  }).join('');
}

async function shareBalanceLink(party, bal){
  if(!fbReady || !state.user){
    showToast('Sign in to share a live balance link');
    return;
  }
  try{
    showToast('Preparing link…');
    await db.collection('publicShares').doc(state.user.uid).collection('parties').doc(party.id).set({
      partyName: party.name,
      balance: bal,
      currency: state.currency,
      updatedAt: firebase.firestore.FieldValue.serverTimestamp()
    });
    const url = `${location.origin}${location.pathname.replace('index.html','')}balance.html?u=${state.user.uid}&p=${party.id}`;
    if(navigator.share){
      navigator.share({title:`${party.name}'s balance`, url}).catch(()=>{});
    } else if(navigator.clipboard){
      await navigator.clipboard.writeText(url);
      showToast('Link copied — share it with them');
    }
  }catch(e){
    showToast('Could not create the link — try again');
  }
}

function shareStatement(party, chronoEntries, balMap){
  const lines = [`Statement — ${party.name}`, `As of ${fmtDate(new Date())}`, ''];
  chronoEntries.forEach(e=>{
    lines.push(`${fmtDate(e.date)}  ${e.type==='gave'?'You Gave':'You Got'} ${fmt(e.amount)}  (bal ${fmt(Math.abs(balMap[e.id]))} ${balMap[e.id]>=0?'Dr':'Cr'})${e.note? ' — '+e.note : ''}`);
  });
  const bal = partyBalance(party.id);
  lines.push('', `Current balance: ${fmt(Math.abs(bal))} ${bal>=0?"(you'll get)":"(you'll pay)"}`);
  const text = lines.join('\n');
  if(navigator.share){
    navigator.share({title: `Statement — ${party.name}`, text}).catch(()=>{});
  } else if(navigator.clipboard){
    navigator.clipboard.writeText(text).then(()=> showToast('Statement copied to clipboard'));
  } else {
    showToast('Sharing not supported on this browser');
  }
}

function openEntryModal(partyId, type, existing){
  const label = type==='gave' ? 'You Gave (they owe more)' : 'You Got (they paid)';
  const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
  openModal(`
    <h3>${existing?'Edit: ':''}${label}</h3>
    <div class="field"><label>Amount (${curSymbol()})</label><input type="number" id="entryAmt" inputmode="decimal" placeholder="0" value="${existing?existing.amount:''}" autofocus></div>
    <div class="field"><label>Note</label>
      <div style="display:flex;gap:6px;">
        <input type="text" id="entryNote" placeholder="e.g. cash, goods, UPI" value="${existing?escapeHtml(existing.note||''):''}" style="flex:1;">
        ${SpeechRec?`<button type="button" class="icon-btn" id="entryMicBtn">${icon('mic',16)}</button>`:''}
      </div>
    </div>
    <div class="field"><label>Date</label><input type="date" id="entryDate" value="${existing?existing.date:new Date().toISOString().slice(0,10)}"></div>
    <div class="field">
      <label>Photo (optional)</label>
      <input type="file" accept="image/*" capture="environment" id="entryPhotoInput" style="display:none;">
      <button type="button" class="settings-btn" id="entryPhotoBtn" style="border:1px solid var(--rule-strong);border-radius:6px;">${icon('image',16)} ${existing&&existing.photo?'Change photo':'Attach photo'}</button>
      <div id="entryPhotoPreviewWrap">${existing&&existing.photo?`<img src="${existing.photo}" class="photo-preview">`:''}</div>
    </div>
    <div class="modal-btns"><button class="btn-secondary" id="cancelBtn">Cancel</button><button class="btn-primary" id="saveBtn">Save</button></div>
  `);
  let tempPhoto = existing ? (existing.photo||null) : null;
  document.getElementById('cancelBtn').onclick = closeModal;
  document.getElementById('entryPhotoBtn').onclick = ()=> document.getElementById('entryPhotoInput').click();
  document.getElementById('entryPhotoInput').onchange = async (e)=>{
    const file = e.target.files[0];
    if(!file) return;
    try{
      tempPhoto = await readAndCompressImage(file);
      document.getElementById('entryPhotoPreviewWrap').innerHTML = `<img src="${tempPhoto}" class="photo-preview">`;
    }catch(err){ showToast('Could not read photo'); }
  };
  if(SpeechRec){
    document.getElementById('entryMicBtn').onclick = ()=>{
      const rec = new SpeechRec();
      rec.lang = 'en-IN';
      rec.onresult = (ev)=>{
        const text = ev.results[0][0].transcript;
        const numMatch = text.match(/\d+(\.\d+)?/);
        if(numMatch && !document.getElementById('entryAmt').value) document.getElementById('entryAmt').value = numMatch[0];
        document.getElementById('entryNote').value = text;
      };
      rec.onerror = ()=> showToast('Could not hear that — try again');
      rec.start();
    };
  }
  document.getElementById('saveBtn').onclick = async ()=>{
    const amt = parseFloat(document.getElementById('entryAmt').value);
    if(!amt || amt<=0){ showToast('Enter a valid amount'); return; }
    const note = document.getElementById('entryNote').value.trim();
    const date = document.getElementById('entryDate').value || new Date().toISOString().slice(0,10);
    if(!state.entries[partyId]) state.entries[partyId] = [];
    if(existing){
      existing.amount = amt; existing.note = note; existing.date = date; existing.photo = tempPhoto;
    } else {
      state.entries[partyId].push({id:uid(), type, amount:amt, note, date, photo: tempPhoto});
    }
    closeModal(); render();
    await saveKhata();
    showToast(existing? 'Entry updated' : 'Entry saved');
  };
}

function yearlyTotals(yearOffsetVal){
  const now = new Date(); now.setFullYear(now.getFullYear() + yearOffsetVal);
  const y = now.getFullYear();
  const totals = new Array(12).fill(0);
  const byCat = {};
  state.expenses.forEach(e=>{
    const d = new Date(e.date);
    if(d.getFullYear()===y){
      totals[d.getMonth()] += e.amount;
      byCat[e.category] = (byCat[e.category]||0) + e.amount;
    }
  });
  return {year:y, totals, byCat};
}

  `);
  let paidFromCash = existing ? !!existing.paidFromCash : true;
  let tempPhoto = existing ? (existing.photo||null) : null;

  };
  document.getElementById('cancelBtn').onclick = closeModal;
  document.getElementById('expPhotoBtn').onclick = ()=> document.getElementById('expPhotoInput').click();
  document.getElementById('expPhotoInput').onchange = async (e)=>{
    const file = e.target.files[0];
    if(!file) return;
    try{
      tempPhoto = await readAndCompressImage(file);
      document.getElementById('expPhotoPreviewWrap').innerHTML = `<img src="${tempPhoto}" class="photo-preview">`;
    }catch(err){ showToast('Could not read photo'); }
  };
  if(SpeechRec){
    document.getElementById('expMicBtn').onclick = ()=>{
      const rec = new SpeechRec();
      rec.lang = 'en-IN';
      rec.onresult = (ev)=>{
        const text = ev.results[0][0].transcript;
        const numMatch = text.match(/\d+(\.\d+)?/);

      rec.onerror = ()=> showToast('Could not hear that — try again');

    } else {

    closeModal(); render();
    await saveExpenses();
    showToast(existing? 'Expense updated' : 'Expense saved');
  };

function readAndCompressImage(file){
  return new Promise((resolve,reject)=>{
    const reader = new FileReader();
    reader.onload = (e)=>{
      const img = new Image();
      img.onload = ()=>{
        const maxW = 800;
        const scale = Math.min(1, maxW/img.width);
        const canvas = document.createElement('canvas');
        canvas.width = Math.round(img.width*scale); canvas.height = Math.round(img.height*scale);
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img,0,0,canvas.width,canvas.height);
        resolve(canvas.toDataURL('image/jpeg',0.6));
      };
      img.onerror = reject;
      img.src = e.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

}

  bindBack();

      document.getElementById('resendVerifyBtn').onclick = async ()=>{
        try{
          await auth.currentUser.sendEmailVerification();
          showToast('Verification email sent');

      };
    }
    document.getElementById('signOutBtn').onclick = async ()=>{
      if(confirm('Sign out? Your data stays saved on this device and in the cloud.')){
        await auth.signOut();
        closeModal();
        showToast('Signed out');
      }
    };
  } else {
    document.getElementById('signInBtn').onclick = ()=>{ closeModal(); openAuthModal('signin'); };
    document.getElementById('signUpBtn').onclick = ()=>{ closeModal(); openAuthModal('signup'); };
    document.getElementById('googleSignInBtn').onclick = async ()=>{

      try{
        const provider = new firebase.auth.GoogleAuthProvider();
        await auth.signInWithRedirect(provider);
      }catch(err){ showToast('Could not start Google sign-in'); }
    };
  }
}

async function deleteProfile(id){
  if(state.profiles.length<=1){ showToast("Can't delete your only ledger"); return; }
  const wasActive = id===state.activeProfileId;
  state.profiles = state.profiles.filter(p=>p.id!==id);
  try{ await storage.delete(`khata-store:${id}`); await storage.delete(`expenses-store:${id}`); await storage.delete(`cash-store:${id}`); }catch(e){}
  if(wasActive){ await switchProfile(state.profiles[0].id); }
  else { await saveProfiles(); }
  showToast('Ledger deleted');
}

function csvEscape(val){
  const s = String(val==null?'':val);
  if(/[",\n]/.test(s)) return '"' + s.replace(/"/g,'""') + '"';
  return s;
}
function exportCSV(){
  const rows = [['Type','Party/Category','Note','Amount','Currency','Date','Direction']];
  state.parties.forEach(p=>{
    (state.entries[p.id]||[]).forEach(e=>{
      rows.push(['Khata', p.name, e.note||'', e.amount, state.currency, e.date, e.type==='gave'?'You Gave':'You Got']);
    });
  });
  state.expenses.forEach(e=>{
    rows.push(['Expense', e.category, e.note||'', e.amount, state.currency, e.date, '']);
  });
  const csv = rows.map(r=> r.map(csvEscape).join(',')).join('\n');
  const blob = new Blob([csv], {type:'text/csv'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `bahi-khata-export-${new Date().toISOString().slice(0,10)}.csv`;
  document.body.appendChild(a); a.click(); a.remove();
  URL.revokeObjectURL(url);
  closeModal();
  showToast('CSV exported');
}

function openAuthModal(mode){
  openModal(`
    <h3>${icon('lock',18)} ${mode==='signup'?'Create account':'Sign in'}</h3>
    <div class="field"><label>Email</label><input type="email" id="authEmail" placeholder="you@example.com" autofocus></div>
    <div class="field"><label>Password</label><input type="password" id="authPassword" placeholder="At least 6 characters"></div>
    <div class="modal-btns"><button class="btn-secondary" id="cancelBtn">Cancel</button><button class="btn-primary" id="authBtn">${mode==='signup'?'Create account':'Sign in'}</button></div>
    <div style="text-align:center;margin-top:16px;font-size:13px;color:var(--ink-soft);font-weight:600;">
      ${mode==='signup' ? 'Already have an account? <a href="#" id="switchAuthMode" style="color:var(--brass);font-weight:800;">Sign in</a>' : 'New here? <a href="#" id="switchAuthMode" style="color:var(--brass);font-weight:800;">Create an account</a>'}
    </div>
    ${mode==='signin' ? `<div style="text-align:center;margin-top:8px;"><a href="#" id="forgotPasswordLink" style="color:var(--ink-soft);font-size:12.5px;font-weight:700;text-decoration:underline;">Forgot password?</a></div>` : ''}
  `);
  document.getElementById('cancelBtn').onclick = closeModal;
  document.getElementById('switchAuthMode').onclick = (e)=>{ e.preventDefault(); closeModal(); openAuthModal(mode==='signup'?'signin':'signup'); };
  if(mode==='signin'){
    document.getElementById('forgotPasswordLink').onclick = async (e)=>{
      e.preventDefault();
      const email = document.getElementById('authEmail').value.trim();
      if(!email){ showToast('Enter your email above first'); return; }
      if(!fbReady){ showToast('Cloud sync unavailable right now'); return; }
      try{
        await auth.sendPasswordResetEmail(email);
        showToast('Password reset email sent — check your inbox');
      }catch(err){ showToast(authErrorMessage(err)); }
    };
  }
  document.getElementById('authBtn').onclick = async ()=>{
    const email = document.getElementById('authEmail').value.trim();
    const password = document.getElementById('authPassword').value;
    if(!email || !password){ showToast('Enter email and password'); return; }
    if(!fbReady){ showToast('Cloud sync unavailable right now'); return; }
    try{
      if(mode==='signup'){
        const cred = await auth.createUserWithEmailAndPassword(email, password);
        if(cred.user && cred.user.sendEmailVerification) cred.user.sendEmailVerification().catch(()=>{});
      } else {
        await auth.signInWithEmailAndPassword(email, password);
      }
      closeModal();
      showToast(mode==='signup' ? 'Account created — check your email to verify' : 'Signed in');
    }catch(err){
      showToast(authErrorMessage(err));
    }
  };
}
function authErrorMessage(err){
  const code = (err && err.code) || '';
  if(code.includes('email-already-in-use')) return 'That email is already registered — try signing in instead';
  if(code.includes('wrong-password') || code.includes('invalid-credential')) return 'Incorrect email or password';
  if(code.includes('user-not-found')) return 'No account with that email — try creating one';
  if(code.includes('weak-password')) return 'Password should be at least 6 characters';
  if(code.includes('invalid-email')) return 'Enter a valid email address';
  return 'Something went wrong — try again';
}

if(fbReady){
  auth.onAuthStateChanged(async (user)=>{
    state.user = user ? {uid:user.uid, email:user.email, emailVerified:user.emailVerified} : null;
    while(state.loading){ await new Promise(r=>setTimeout(r,100)); }
    if(user){ await loadFromCloud(); } else { render(); }
  });
  auth.getRedirectResult().catch((err)=>{
    if(err && err.code) showToast(authErrorMessage(err));
  });
}

async function exportBackup(){
  const ledgers = {};
  for(const p of state.profiles){
    let khataData = {parties: [], entries: {}};
    let expData = {expenses: []};
    let cashData = {cashTransactions: []};
    if(p.id === state.activeProfileId){
      khataData = {parties: state.parties, entries: state.entries};
      expData = {expenses: state.expenses};
      cashData = {cashTransactions: state.cashTransactions};
    } else {
      try{ const k = await storage.get(`khata-store:${p.id}`); if(k && k.value) khataData = JSON.parse(k.value); }catch(e){}
      try{ const x = await storage.get(`expenses-store:${p.id}`); if(x && x.value) expData = JSON.parse(x.value); }catch(e){}
      try{ const c = await storage.get(`cash-store:${p.id}`); if(c && c.value) cashData = JSON.parse(c.value); }catch(e){}
    }
    ledgers[p.id] = {name: p.name, khata: khataData, expenses: expData, cash: cashData};
  }
  const data = {
    exportedAt: new Date().toISOString(),
    profiles: state.profiles,
    activeProfileId: state.activeProfileId,
    ledgers,
    settings: {currency: state.currency, theme: state.theme, budgets: state.budgets, categories: state.categories, lang: state.lang, upiId: state.upiId}
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `bahi-khata-backup-${new Date().toISOString().slice(0,10)}.json`;
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
  closeModal();
  showToast('Backup downloaded');
}

document.getElementById('importFileInput').addEventListener('change', function(e){
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = async function(evt){
    try{
      const data = JSON.parse(evt.target.result);
      if(!confirm('Import this backup? It will replace your current data.')) return;
      if(data.ledgers){
        state.profiles = data.profiles || state.profiles;
        state.activeProfileId = data.activeProfileId || (state.profiles[0] && state.profiles[0].id);
        for(const pid in data.ledgers){
          const l = data.ledgers[pid];
          await storage.set(`khata-store:${pid}`, JSON.stringify(l.khata||{parties:[],entries:{}}));
          await storage.set(`expenses-store:${pid}`, JSON.stringify(l.expenses||{expenses:[]}));
          await storage.set(`cash-store:${pid}`, JSON.stringify(l.cash||{cashTransactions:[]}));
        }
        await saveProfiles();
      } else if(data.khata){
        state.parties = data.khata.parties||[]; state.entries = data.khata.entries||{};
        state.expenses = (data.expenses && data.expenses.expenses) || [];
        state.cashTransactions = (data.cash && data.cash.cashTransactions) || [];
      }
      if(data.settings){
        if(data.settings.currency) state.currency = data.settings.currency;
        if(data.settings.theme) state.theme = data.settings.theme;
        if(data.settings.budgets) state.budgets = data.settings.budgets;
        if(data.settings.categories) state.categories = data.settings.categories;
        if(data.settings.lang) state.lang = data.settings.lang;
        if(data.settings.upiId) state.upiId = data.settings.upiId;
      }
      applyTheme();
      await saveSettings();
      if(data.ledgers){
        await switchProfile(state.activeProfileId);
      } else {
        closeModal(); render();
        await saveKhata(); await saveExpenses(); await saveCash();
      }
      showToast('Backup restored');
    }catch(err){ showToast('Could not read this file'); }
    e.target.value = '';
  };
  reader.readAsText(file);
});

// ---------- LOCK SCREEN ----------
function showLockScreen(){
  document.getElementById('lockScreen').style.display = 'flex';
}
function hideLockScreen(){
  document.getElementById('lockScreen').style.display = 'none';
}
document.getElementById('unlockBtn').addEventListener('click', attemptUnlock);
document.getElementById('pinInput').addEventListener('keydown', (e)=>{ if(e.key==='Enter') attemptUnlock(); });
function attemptUnlock(){
  const val = document.getElementById('pinInput').value;
  if(val === state.pin){
    state.pinUnlocked = true;
    hideLockScreen();
    render();
  } else {
    const el = document.getElementById('lockScreen');
    el.classList.add('shake');
    setTimeout(()=> el.classList.remove('shake'), 350);
    document.getElementById('pinInput').value = '';
    showToast('Incorrect PIN');
  }
}
document.getElementById('forgotPinBtn').addEventListener('click', async ()=>{
  if(confirm('This removes PIN protection (your khata and expense data stays safe). Continue?')){
    state.pin = ''; state.pinUnlocked = true;
    hideLockScreen();
    await saveSettings();
    render();
  }
});

document.querySelectorAll('.tabbar button').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    state.tab = btn.dataset.tab;
    if(state.tab==='khata') state.activePartyId = null;
    render();
  });
});

window.addEventListener('popstate', ()=>{
  if(document.getElementById('modalOverlay')){
    closeModal();
    return;
  }
  if(state.tab === 'khata-detail'){
    state.tab = 'khata';
    state.activePartyId = null;
    render();
    return;
  }
  if(state.tab !== 'home'){
    state.tab = 'home';
    render();
  }
});

loadData();

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').then((reg) => {
      reg.update();
    }).catch(()=>{});
  });
  let refreshingAfterUpdate = false;
  navigator.serviceWorker.addEventListener('controllerchange', () => {
    if (refreshingAfterUpdate) return;
    refreshingAfterUpdate = true;
    window.location.reload();
  });
}
